name: RootAI CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov black ruff mypy
        pip install numpy
    
    - name: Check code formatting with Black
      run: black --check src/ api/ benchmarks/ || true
    
    - name: Lint with Ruff
      run: ruff check src/ api/ benchmarks/ || true
    
    - name: Run quick tests
      run: |
        chmod +x test_quick.sh
        ./test_quick.sh
    
    - name: Run Python syntax check
      run: |
        python -m py_compile src/core/*.py
        python -m py_compile api/*.py
        python -m py_compile benchmarks/*.py

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        docker build -t rootai:test .
    
    - name: Test Docker image
      run: |
        docker run --rm rootai:test python -c "print('RootAI v3.0 Docker OK')"

  documentation:
    name: Check Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check required files
      run: |
        test -f README.md
        test -f DEPLOYMENT.md
        test -f EXAMPLES.md
        test -f LICENSE
        test -f pyproject.toml
        test -f Dockerfile
        echo "All documentation files present"

name: RootAI CPU CI
on:
  push: {branches: [ main ]}
  pull_request: {branches: [ main ]}
permissions:
  contents: read
jobs:
  wheelhouse:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    - name: Create wheelhouse
      run: |
        python -m pip install --upgrade pip wheel
        mkdir -p wheelhouse
        pip download -r requirements.txt -d wheelhouse --only-binary=:all: || pip download -r requirements.txt -d wheelhouse
        pip download pytest -d wheelhouse --only-binary=:all: || pip download pytest -d wheelhouse
    - name: Cache wheelhouse
      uses: actions/cache@v4
      with:
        path: wheelhouse
        key: wheelhouse-${{ runner.os }}-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          wheelhouse-${{ runner.os }}-
    - name: Upload wheelhouse
      uses: actions/upload-artifact@v4
      with:
        name: wheelhouse
        path: wheelhouse/

  test-cpu:
    runs-on: ubuntu-latest
    needs: wheelhouse
    env:
      ROOTAI_OFFLINE: "1"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: "3.11" }
    - name: Download wheelhouse
      uses: actions/download-artifact@v4
      with:
        name: wheelhouse
        path: wheelhouse/
    - name: Install (CPU-only, offline)
      run: |
        python -m pip install --upgrade pip
        pip install --no-index --find-links ./wheelhouse -r requirements.txt
        pip install --no-index --find-links ./wheelhouse pytest
        pip install -e . --no-deps
    - name: Run tests
      run: pytest -q
    - name: Parse fixture (offline test)
      run: |
        python -m rootai.data.parse_wiktextract \
          --input tests/fixtures/wiktextract_sample.jsonl.gz \
          --out-dir test_parse_output \
          --langs ar en \
          --formats csv
    - name: Upload parse outputs
      uses: actions/upload-artifact@v4
      with:
        name: test-parse-outputs
        path: test_parse_output/

  quick-benchmark:
    runs-on: ubuntu-latest
    needs: wheelhouse
    env:
      ROOTAI_OFFLINE: "1"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with: { python-version: "3.11" }
    - name: Download wheelhouse
      uses: actions/download-artifact@v4
      with:
        name: wheelhouse
        path: wheelhouse/
    - name: Install minimal deps (offline)
      run: |
        python -m pip install --upgrade pip
        pip install --no-index --find-links ./wheelhouse -r requirements.txt
        pip install -e . --no-deps
    - name: Demo benchmark (20Q)
      run: |
        python benchmarks/semantic_mmlu.py
        test -f benchmark_results.json
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark_results.json

  omw-download:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    - name: Install wn library
      run: |
        python -m pip install --upgrade pip
        pip install wn
    - name: Download OMW/OEWN lexicons
      run: |
        python -m rootai.data.pull_dictionaries \
          --dest data/dictionaries/omw \
          --sets oewn:2024 omw:1.4 omw-arb:1.4
    - name: Upload OMW data
      uses: actions/upload-artifact@v4
      with:
        name: omw-data
        path: data/dictionaries/omw/
